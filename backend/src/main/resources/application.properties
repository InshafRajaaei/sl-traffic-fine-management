spring.application.name=traffic-fines-backend
server.port=8080

# MySQL datasource — set DB_USERNAME and DB_PASSWORD in backend/.env
spring.datasource.url=jdbc:mysql://localhost:3306/traffic_fines_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT — set JWT_SECRET and JWT_EXPIRY_MS in backend/.env
jwt.secret=${JWT_SECRET}
jwt.expiry-ms=${JWT_EXPIRY_MS:86400000}

logging.level.org.springframework.security=DEBUG